<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Work+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1 class="name" id="name"></h1>
  <p class="label" id="label"></p>
</header>

<main>

  <section class="row">
    <div class="row-label">
      <p class="section-title">About</p>
    </div>
    <div class="row-content">
      <p class="about-text" id="aboutParagraph"></p>
    </div>
  </section>

  <section class="row">
    <div class="row-label">
      <p class="section-title">Projects</p>
    </div>
    <div class="row-content">
      <div id="projectsList"></div>
    </div>
  </section>

</main>

<footer class="colophon">
  <a class="footer-link" id="emailLink" href="#"></a>
  <span class="socials" id="socials"></span>
  <span class="year" id="footerYear"></span>
</footer>

<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
