<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Copywriter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="hero">
    <p class="eyebrow" id="eyebrow"></p>

    <h1 class="headline">
      <span id="headlineBefore"></span>
      <span class="revision">
        <span class="insert" id="insertWord"></span>
        <span class="strike" id="strikeWord"></span>
      </span>
      <span id="headlineAfter"></span>
    </h1>

    <p class="subhead" id="subhead"></p>

    <div class="contact-row">
      <a class="mono-link" id="emailLink" href="#"></a>
      <span class="socials" id="socials"></span>
    </div>
  </header>

  <section class="sheet about">
    <p class="page-label">P.01 — ABOUT</p>
    <div class="about-grid">
      <p class="about-text" id="aboutParagraph"></p>
      <aside class="margin-note">
        <span class="note-mark">note —</span>
        <span id="marginNote"></span>
      </aside>
    </div>
  </section>

  <section class="sheet portfolio">
    <p class="page-label">P.02 — SELECTED DRAFTS</p>
    <div class="portfolio-grid" id="portfolioGrid"></div>
  </section>

  <footer class="colophon">
    <p><span id="footerName"></span> — prepared <span id="footerYear"></span></p>
  </footer>

</div>

<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
